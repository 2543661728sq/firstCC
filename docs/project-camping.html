  <style>
    .project-hero {
      padding: 8rem 2rem 4rem;
      max-width: 1200px; margin: 0 auto;
      text-align: center;
    }
    .project-category {
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.2em;
      color: #6e6e73; text-transform: uppercase; margin-bottom: 1rem;
    }
    .project-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700; margin-bottom: 0.5rem;
    }
    .project-en {
      font-size: 1rem; color: #6e6e73; font-weight: 300;
      font-family: 'Inter', sans-serif; margin-bottom: 2rem;
    }
    .project-tags {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      justify-content: center; margin-bottom: 3rem;
    }
    .project-tags span {
      font-size: 0.75rem; padding: 0.4rem 1rem;
      background: #f0f0f2; border-radius: 100px; color: #6e6e73;
    }
    .project-content {
      max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem;
    }
    .project-image {
      width: 100%; border-radius: 16px; overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 3rem;
    }
    .project-image img {
      width: 100%; height: auto; display: block;
    }
    .project-desc {
      max-width: 800px; margin: 0 auto 3rem;
      font-size: 1.05rem; line-height: 1.9; color: #3a3a3c;
      text-align: center;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.9rem; color: #1d1d1f;
      padding: 0.8rem 1.5rem; background: #f0f0f2;
      border-radius: 100px; transition: background 0.3s;
      margin-top: 2rem;
    }
    .back-link:hover { background: #e0e0e2; }
  </style>

  <nav id="nav" class="scrolled">
    <div class="nav-logo">孙琪</div>
    <a href="index.html" class="nav-back">
      <i class="fa-solid fa-arrow-left"></i> 返回首页
    </a>
  </nav>

  <section class="project-hero">
    <div class="project-category">景观设计</div>
    <h1 class="project-title">露营基地景观设计</h1>
    <p class="project-en">Camping Site Landscape Design</p>
    <div class="project-tags">
      <span>景观设计</span>
      <span>露营基地</span>
      <span>户外空间</span>
      <span>场地规划</span>
    </div>
  </section>

  <section class="project-content">
    <div class="project-image">
      <img src="images/景观作品-露营基地.jpg" alt="露营基地景观设计">
    </div>
    <p class="project-desc">
      面向户外休闲的露营基地景观规划，结合地形特点与使用需求，打造亲近自然的露营体验空间。设计兼顾功能分区、动线组织与环境保护。通过合理的场地规划，划分露营区、活动区、服务区等功能空间，确保各区域既相对独立又有机联系。景观设计尊重原有地形地貌，最大限度保留自然植被，营造人与自然和谐共处的户外体验。
    </p>
    <div style="text-align: center;">
      <a href="index.html#works" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> 返回作品集
      </a>

  </button>
